spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.mariadb.jdbc.Driver
jwt:
  expiration: 3600
  secret: ${JWT_SECRET}
google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  redirect-uri: ${GOOGLE_REDIRECT_URI}
  authorized-email: ${GOOGLE_AUTHORIZED_EMAIL}
  token-encryption:
    secret: ${GOOGLE_TOKEN_ENCRYPTION_SECRET}