spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/misgastos?serverTimezone=UTC
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
scheduling:
  task-scheduler:
    pool-size: 1
  task-executor:
    core-pool-size: 1
    max-pool-size: 5
    queue-capacity: 5